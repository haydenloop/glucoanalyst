<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlucoAnalyst</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e17;
    --bg2: #0f1420;
    --surface: #131929;
    --surface2: #1a2235;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --ink: #eef2ff;
    --ink2: #8fa3bf;
    --muted: #4a5d72;
    --green: #2d9e6b;
    --green-soft: rgba(45,158,107,0.1);
    --amber: #d97706;
    --amber-soft: rgba(217,119,6,0.1);
    --blue: #3b82f6;
    --blue-soft: rgba(59,130,246,0.1);
    --red: #e11d48;
    --red-soft: rgba(225,29,72,0.1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { font-size:16px; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(45,158,107,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(45,158,107,0.03) 1px, transparent 1px);
    background-size: 44px 44px;
    pointer-events: none;
    z-index: 0;
  }
  .orb1 {
    position: fixed; top:-150px; left:-150px;
    width:500px; height:500px;
    background: radial-gradient(circle, rgba(45,158,107,0.08) 0%, transparent 65%);
    pointer-events: none; z-index:0;
  }
  .orb2 {
    position: fixed; bottom:-120px; right:-120px;
    width:400px; height:400px;
    background: radial-gradient(circle, rgba(59,130,246,0.05) 0%, transparent 65%);
    pointer-events: none; z-index:0;
  }
  .container { width:100%; max-width:480px; position:relative; z-index:1; }

  /* ── CONNECT PAGE ── */
  .connect-page { animation: fadeUp 0.6s ease both; }
  .brand-row {
    display:flex; align-items:center; gap:10px; margin-bottom:56px;
  }
  .brand-dot {
    width:8px; height:8px; background:var(--green); border-radius:50%;
    box-shadow: 0 0 8px rgba(45,158,107,0.5);
  }
  .brand-wordmark {
    font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
    letter-spacing:2px; text-transform:uppercase; color:var(--ink2);
  }
  .hero-headline {
    font-family:'Cormorant Garamond',serif; font-size:52px; font-weight:400;
    line-height:1.1; letter-spacing:-1.5px; margin-bottom:20px; color:var(--ink);
  }
  .hero-headline em { font-style:italic; color:var(--green); }
  .hero-sub {
    font-size:15px; color:var(--ink2); font-weight:300; line-height:1.7;
    margin-bottom:40px; max-width:360px;
  }
  .connect-btn {
    display:inline-flex; align-items:center; gap:10px;
    background:var(--green); color:#fff;
    padding:15px 32px; border-radius:4px;
    text-decoration:none; font-weight:500; font-size:14px; letter-spacing:0.3px;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(45,158,107,0.25);
  }
  .connect-btn:hover {
    background:#248a5a; transform:translateY(-1px);
    box-shadow: 0 8px 32px rgba(45,158,107,0.35);
  }
  .privacy-note { margin-top:16px; font-size:12px; color:var(--muted); line-height:1.6; }
  .rule {
    height:1px;
    background: linear-gradient(90deg, transparent, var(--border2), transparent);
    margin:48px 0;
  }
  .features-row { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }
  .feature-item {}
  .feature-num {
    font-family:'Cormorant Garamond',serif; font-size:38px; font-weight:400;
    color:var(--green); line-height:1; margin-bottom:8px;
  }
  .feature-title { font-size:13px; font-weight:500; color:var(--ink); margin-bottom:4px; }
  .feature-desc { font-size:11px; color:var(--muted); line-height:1.5; font-weight:300; }

  /* ── HOME PAGE ── */
  .home-page { animation: fadeUp 0.6s ease both; }
  .top-bar {
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:40px; padding-bottom:20px; border-bottom:1px solid var(--border);
  }
  .top-wordmark {
    font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
    letter-spacing:2px; text-transform:uppercase; color:var(--ink2);
    display:flex; align-items:center; gap:8px;
  }
  .connected-badge {
    display:flex; align-items:center; gap:6px;
    font-size:12px; color:var(--green); font-weight:400;
  }
  .connected-dot {
    width:6px; height:6px; background:var(--green); border-radius:50%;
    box-shadow: 0 0 6px rgba(45,158,107,0.6);
    animation: livePulse 2s infinite;
  }
  @keyframes livePulse {
    0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)}
  }
  .home-headline {
    font-family:'Cormorant Garamond',serif; font-size:40px; font-weight:400;
    letter-spacing:-1px; line-height:1.15; margin-bottom:12px; color:var(--ink);
  }
  .home-headline em { font-style:italic; color:var(--green); }
  .home-sub {
    font-size:15px; color:var(--ink2); font-weight:300; line-height:1.6; margin-bottom:32px;
  }
  .analyse-btn {
    display:flex; align-items:center; justify-content:space-between; width:100%;
    background:var(--surface); border:1px solid rgba(45,158,107,0.25);
    color:var(--ink); padding:20px 24px; border-radius:4px;
    text-decoration:none; font-size:16px; font-weight:500; margin-bottom:16px;
    transition: all 0.2s; box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  }
  .analyse-btn:hover {
    border-color:rgba(45,158,107,0.5); transform:translateY(-1px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    background: var(--surface2);
  }
  .analyse-btn-label { font-weight:600; font-size:15px; }
  .analyse-btn-sub { font-size:12px; color:var(--ink2); font-weight:300; margin-top:3px; }
  .analyse-btn-arrow { font-size:20px; color:var(--green); opacity:0.8; }
  .meta-grid {
    display:grid; grid-template-columns:1fr 1fr; gap:1px;
    background:var(--border); border:1px solid var(--border); border-radius:4px; overflow:hidden;
  }
  .meta-cell { background:var(--surface); padding:18px 20px; }
  .meta-label {
    font-size:10px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase;
    color:var(--muted); margin-bottom:6px;
  }
  .meta-value {
    font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400;
    color:var(--green); line-height:1;
  }
  .meta-sub { font-size:11px; color:var(--muted); margin-top:3px; }

  /* ── LOADING PAGE ── */
  .loading-page { text-align:center; animation: fadeUp 0.5s ease both; padding:40px 0; }
  .loading-wordmark {
    font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500;
    letter-spacing:2px; text-transform:uppercase; color:var(--muted);
    margin-bottom:48px; display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .loading-headline {
    font-family:'Cormorant Garamond',serif; font-size:36px; font-weight:400;
    letter-spacing:-1px; margin-bottom:8px; color:var(--ink);
  }
  .loading-headline em { font-style:italic; color:var(--green); }
  .loading-sub { font-size:14px; color:var(--muted); font-weight:300; margin-bottom:40px; }
  .progress-track {
    background:var(--surface2); height:2px; border-radius:1px;
    overflow:hidden; margin-bottom:32px;
  }
  .progress-fill {
    height:100%; background:var(--green); border-radius:1px;
    animation: progressAnim 2.5s ease infinite;
    box-shadow: 0 0 8px rgba(45,158,107,0.4);
  }
  @keyframes progressAnim {
    0%{width:0%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%}
  }
  .loading-steps { display:flex; flex-direction:column; gap:4px; max-width:260px; margin:0 auto; }
  .loading-step {
    font-size:13px; color:var(--muted); padding:8px 0;
    border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:10px; font-weight:300;
    opacity:0.3; transition: all 0.4s ease;
  }
  .loading-step::before {
    content:''; width:6px; height:6px; border-radius:50%;
    background:var(--border2); flex-shrink:0; transition:background 0.3s;
  }
  .loading-step.active { opacity:1; color:var(--green); }
  .loading-step.active::before { background:var(--green); box-shadow:0 0 6px rgba(45,158,107,0.5); }

  /* ── RESULTS PAGE ── */
  .results-page { animation: fadeUp 0.6s ease both; }
  .results-topbar {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:40px; padding-bottom:20px; border-bottom:1px solid var(--border);
  }
  .back-link {
    font-size:13px; color:var(--ink2); text-decoration:none;
    display:flex; align-items:center; gap:6px; transition:color 0.2s;
  }
  .back-link:hover { color:var(--green); }
  .results-badge {
    font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:0.5px;
  }
  .results-headline {
    font-family:'Cormorant Garamond',serif; font-size:42px; font-weight:400;
    letter-spacing:-1.5px; line-height:1.1; margin-bottom:28px; color:var(--ink);
  }
  .results-headline em { font-style:italic; color:var(--green); }

  /* Score */
  .score-tir-row { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
  .score-block {
    display:flex; align-items:center; gap:24px; padding:24px;
    background:var(--surface); border:1px solid var(--border); border-radius:4px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  }
  .score-ring-wrap { position:relative; width:84px; height:84px; flex-shrink:0; }
  .score-ring-wrap svg { transform:rotate(-90deg); }
  .score-ring-bg { fill:none; stroke:var(--surface2); stroke-width:6; }
  .score-ring-fill {
    fill:none; stroke-width:6; stroke-linecap:round;
    stroke-dasharray:214; stroke-dashoffset:214;
    transition: stroke-dashoffset 2s cubic-bezier(0.34,1.2,0.64,1);
  }
  .score-center {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%); text-align:center;
  }
  .score-num { font-family:'Cormorant Garamond',serif; font-size:28px; font-weight:400; line-height:1; }
  .score-denom { font-size:10px; color:var(--muted); font-family:'JetBrains Mono',monospace; }
  .score-right { flex:1; }
  .score-label {
    font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:400;
    margin-bottom:6px; color:var(--ink);
  }
  .score-label em { font-style:italic; }
  .score-desc { font-size:13px; color:var(--ink2); line-height:1.6; font-weight:300; }

  /* TIR */
  .tir-block {
    background:var(--surface); border:1px solid var(--border);
    border-radius:4px; padding:20px 24px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  }
  .tir-header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px; }
  .tir-label { font-size:10px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; color:var(--muted); }
  .tir-num { font-family:'Cormorant Garamond',serif; font-size:32px; font-weight:400; line-height:1; }
  .tir-track { background:var(--surface2); height:6px; border-radius:3px; overflow:hidden; margin-bottom:6px; }
  .tir-fill { height:100%; border-radius:3px; transition:width 1.5s cubic-bezier(0.34,1.2,0.64,1); }
  .tir-legend { display:flex; justify-content:space-between; font-size:10px; color:var(--muted); margin-bottom:14px; }
  .tir-breakdown { display:flex; flex-direction:column; gap:6px; }
  .tir-breakdown-item {
    display:flex; align-items:center; gap:8px;
    font-size:12px; color:var(--ink2); font-weight:300;
  }
  .tir-breakdown-item strong { margin-left:auto; font-weight:500; color:var(--ink); }
  .tir-bd-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  /* Best day */
  .best-day-block {
    background:var(--surface); border:1px solid var(--border);
    border-radius:4px; padding:20px 24px; margin-bottom:20px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.2);
  }
  .best-day-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:4px; }
  .best-day-date {
    font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:400;
    color:var(--ink); margin-top:2px;
  }
  .best-day-stats { display:flex; gap:16px; }
  .bd-stat { text-align:right; }
  .bd-stat-val { font-family:'Cormorant Garamond',serif; font-size:20px; font-weight:400; line-height:1; color:var(--ink); }
  .bd-stat-lbl { font-size:10px; color:var(--muted); letter-spacing:0.5px; margin-top:2px; }

  /* Insights */
  .insights-heading {
    font-size:10px; font-weight:500; letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); margin:24px 0 12px;
  }
  .insight-card {
    padding:18px 20px; background:var(--surface); border:1px solid var(--border);
    border-radius:4px; margin-bottom:8px; position:relative; overflow:hidden;
    animation: fadeUp 0.5s ease both; transition: border-color 0.2s, transform 0.15s;
    box-shadow: 0 2px 16px rgba(0,0,0,0.15);
  }
  .insight-card:hover { transform:translateX(3px); }
  .insight-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  }
  .insight-card.positive { border-color:rgba(45,158,107,0.2); }
  .insight-card.positive::before { background:var(--green); }
  .insight-card.positive:hover { border-color:rgba(45,158,107,0.4); }
  .insight-card.warning { border-color:rgba(217,119,6,0.2); }
  .insight-card.warning::before { background:var(--amber); }
  .insight-card.warning:hover { border-color:rgba(217,119,6,0.4); }
  .insight-card.info { border-color:rgba(59,130,246,0.2); }
  .insight-card.info::before { background:var(--blue); }
  .insight-card.info:hover { border-color:rgba(59,130,246,0.4); }
  .insight-card.alert { border-color:rgba(225,29,72,0.2); }
  .insight-card.alert::before { background:var(--red); }
  .insight-card.alert:hover { border-color:rgba(225,29,72,0.4); }
  .insight-type {
    font-size:10px; font-weight:500; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:8px;
  }
  .insight-card.positive .insight-type { color:var(--green); }
  .insight-card.warning .insight-type { color:var(--amber); }
  .insight-card.info .insight-type { color:var(--blue); }
  .insight-card.alert .insight-type { color:var(--red); }
  .insight-text { font-size:14px; line-height:1.7; color:var(--ink2); font-weight:300; }

  /* Sparklines */
  .sparkline-wrap { margin-top:16px; border-top:1px solid var(--border); padding-top:14px; }
  .sparkline-wrap svg { display:block; width:100%; overflow:visible; }
  .sparkline-times {
    display:flex; justify-content:space-between; font-size:10px; color:var(--muted);
    font-family:'JetBrains Mono',monospace; margin-top:4px; letter-spacing:0.3px;
  }

  /* Bottom */
  .bottom-area { margin-top:28px; }
  .run-again-btn {
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; background:var(--surface); border:1px solid var(--border2);
    color:var(--ink2); padding:14px; border-radius:4px;
    text-decoration:none; font-size:13px; font-weight:400;
    transition: all 0.2s; margin-bottom:16px;
  }
  .run-again-btn:hover { border-color:rgba(45,158,107,0.4); color:var(--green); }
  .disclaimer { font-size:11px; color:var(--muted); text-align:center; line-height:1.7; font-weight:300; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to { opacity:1; transform:translateY(0); }
  }
</style>
</head>
<body>
<div class="orb1"></div>
<div class="orb2"></div>
<div class="container">
  PAGE_CONTENT
</div>
<script>
  const fill = document.querySelector('.score-ring-fill');
  if (fill) {
    const score = parseInt(document.querySelector('.score-num')?.textContent || '0');
    const offset = 214 - (score / 100) * 214;
    setTimeout(() => { fill.style.strokeDashoffset = offset; }, 200);
  }
  const steps = document.querySelectorAll('.loading-step');
  if (steps.length) {
    let i = 0;
    steps[0].classList.add('active');
    setInterval(() => {
      steps[i]?.classList.remove('active');
      i = (i + 1) % steps.length;
      steps[i]?.classList.add('active');
    }, 900);
  }
  document.querySelectorAll('.insight-card').forEach((card, idx) => {
    card.style.animationDelay = `${0.1 + idx * 0.08}s`;
  });
</script>
</body>
</html>
